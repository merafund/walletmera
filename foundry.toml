[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.34"

via_ir = true
optimizer = true
optimizer_runs = 1000

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[lint]
# Use **/* so rust `glob` expands nested files (test/** alone can miss subdirs).
ignore = ["test/**/*", "src/interfaces/**/*"]
# Project-wide lint relaxations (reviewed manually).
exclude_lints = ["unsafe-typecast", "mixed-case-function"]
